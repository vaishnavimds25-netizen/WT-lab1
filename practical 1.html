<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Structure Example</title>
</head>
<body>

        <header>
        <h1>My Website</h1>
        <p>This is the header section of the webpage.</p>
    </header>

      <section>
        <h2>Main Section</h2>
        <p>This section contains related content grouped together.</p>

               <article>
            <h3>Article 1</h3>
            <p>This is an independent article. It can stand alone and be reused.</p>
        </article>

        <article>
            <h3>Article 2</h3>
            <p>This is another article inside the same section.</p>
        </article>
    </section>

   
    <footer>
        <p> 2026 My Website.</p>
    </footer>

</body>
</html>
